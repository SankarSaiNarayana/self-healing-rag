services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - ./storage/qdrant:/qdrant/storage

  rag:
    build: .
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./.chroma:/app/.chroma
      - ./data:/app/data
    depends_on:
      - qdrant

